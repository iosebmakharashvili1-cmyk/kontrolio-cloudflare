name = "kontrolio"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

[[kv_namespaces]]
binding = "KV"
id = "693f5575e5fa4b7d8b219e8ea3a56916"

[vars]
# TTC credentials — ეს sensitive-ია, ამიტომ ეს ფაილი მხოლოდ
# non-secret values-ისთვისაა. TTC_COOKIE და TTC_API_KEY — Pages-ის
# dashboard-ში ცალკე "Environment Variables" (encrypted) სექციაში ჩაწერე.
#
# ასევე Pages Dashboard → Environment Variables-ში საჭიროა:
#   TELEGRAM_BOT_TOKEN     — BotFather-ისგან მიღებული token
#   TELEGRAM_CHAT_ID       — შენი პირადი chat ID (admin, ვინც ამტკიცებს)
#   TELEGRAM_WEBHOOK_SECRET — თვითონ შენ გამოგონილი შემთხვევითი სტრინგი,
#                             Telegram-ის webhook-ის spoofing-ისგან დასაცავად
#                             (setWebhook-ის დროს ერთხელ გამოიყენება)
#   ADMIN_PASSWORD          — თვითონ შენ გამოგონილი პაროლი, custom route-ების
#                             წასაშლელად (routes-community.html-ზე გამოგეთხოვება)
#
#   RUSTAVI_API_KEY         — rustavi-transit.azrycloud.com-ის X-api-key header.
#                             (mobile app-იდან მოპოვებული; ცალკეა TTC_API_KEY-სგან,
#                             თუმცა ამჟამად იგივე მნიშვნელობა გამოიყენება)
#   RUSTAVI_COOKIE          — [არასავალდებულო, ამჟამად ცარიელია] rustavi-ს
#                             endpoint-მა შესაძლოა Cookie session მოითხოვოს.
#                             API_KEY-ის გარეშეც ცდილობს მუშაობას (fail-open),
#                             მაგრამ თუ /api/arrivals ხშირად 401/403-ს
#                             აბრუნებს Rustavi-ს გაჩერებებზე, ეს მნიშვნელობა
#                             (mobile app-ის ინსპექტორით მოპოვებული ცოცხალი
#                             Cookie header) აქ უნდა დაემატოს.
#
#   VAPID_PUBLIC_KEY        — Web Push-ისთვის. დაგენერირებულია ერთხელ,
#                             ორივე (public+private) მუდმივი უნდა დარჩეს —
#                             შეცვლა ყველა არსებულ subscription-ს გააუქმებს.
#   VAPID_PRIVATE_KEY       — ზემოთის წყვილი, secret-ად ინახება
#   VAPID_SUBJECT           — [არასავალდებულო] "mailto:admin@kontrolio.live"
#                             ფორმატის საკონტაქტო — push service-ებმა რომ
#                             იცოდნენ ვის მიმართონ პრობლემის შემთხვევაში.
#                             არ დაყენების შემთხვევაში default გამოიყენება.
