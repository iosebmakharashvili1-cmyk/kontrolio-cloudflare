<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>საზოგადოების მარშრუტები — Kontrolio</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="/style.css?v=10">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <div class="rcPage" id="rcPage">
    <header class="rcPage__header">
      <a class="rcPage__backBtn" id="rcBackBtn" href="index.html" aria-label="უკან"><i data-lucide="arrow-left"></i></a>
      <div class="rcPage__title"><i data-lucide="route"></i> <span id="rcHeaderTitle">მარშრუტები</span></div>
      <button class="rcPage__addBtn" id="rcAddBtn" type="button"><i data-lucide="pencil"></i> ახალი მარშრუტი</button>
    </header>

    <!-- სიის სექცია ძებნით -->
    <div class="rcPage__body" id="rcListBody">
      <div class="rcSearchBox">
        <div class="searchInputWrap expanded" style="position: static; width: 100%; margin-bottom: 16px; opacity: 1; pointer-events: auto;">
          <i data-lucide="search" class="searchIcon"></i>
          <input type="text" id="rcSearchInput" class="searchInput" placeholder="მოძებნე ნომრით ან სახელით..." autocomplete="off">
        </div>
      </div>
      <div id="rcList" class="rcListGrid">
        <p class="rcListEmpty">იტვირთება...</p>
      </div>
    </div>

    <!-- ხატვის რეჟიმი -->
    <div class="rcDrawWrap" id="rcDrawWrap">
      <div class="rcDrawWrap__mapCol" style="position:relative;">
        <div id="rcMap"></div>
        <!-- GPS ღილაკი -->
        <button id="rcGpsBtn" class="rcGpsBtn" title="ჩემი მდებარეობა"><i data-lucide="navigation"></i></button>
        
        <p class="rcDrawHint" id="rcDrawHint">დააჭირე რუკას წერტილის დასასმელად. წერტილები შეგიძლია ათრიო (Drag) ან წაშალო (Right Click).</p>
        
        <div class="rcDrawToolbar">
          <button type="button" id="rcUndoBtn"><i data-lucide="undo-2"></i> უკან</button>
          <button type="button" id="rcClearBtn" class="danger"><i data-lucide="trash-2"></i> გასუფთავება</button>
        </div>
        <button class="rcStepNextBtn hidden" id="rcStepNextBtn" type="button">
          გაგრძელება <i data-lucide="arrow-right"></i>
        </button>
      </div>

      <div class="rcDrawWrap__formCol">
        <div class="rcStepBackBar hidden" id="rcStepBackBar">
          <button type="button" id="rcStepBackBtn"><i data-lucide="arrow-left"></i> რუკაზე დაბრუნება</button>
        </div>
        <div class="rcForm">
          <label class="rcForm__label">ტრანსპორტის ტიპი</label>
          <div class="rcVehicleToggle">
            <button type="button" data-vehicle="bus" class="selected" id="rcVehicleBus"><i data-lucide="bus"></i> ავტობუსი</button>
            <button type="button" data-vehicle="minibus" id="rcVehicleMinibus"><i data-lucide="truck"></i> მარშრუტკა</button>
          </div>

          <label class="rcForm__label">მარშრუტის ნომერი</label>
          <input class="rcInput" id="rcRouteNumber" inputmode="numeric" maxlength="3" placeholder="მაგ. 155" />
          <p class="rcFieldError" id="rcRouteNumberError"></p>

          <label class="rcForm__label">დასახელება</label>
          <input class="rcInput" id="rcRouteName" maxlength="80" placeholder="საიდან - სად" />

          <label class="rcForm__label">მოკლე აღწერა</label>
          <textarea class="rcTextarea" id="rcRouteDesc" maxlength="300" placeholder="დამატებითი დეტალები..."></textarea>

          <div class="rcSubmitBarStatic">
             <button type="button" id="rcSubmitBtn" class="rcMainSubmitBtn">გაგზავნა განსახილველად</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="stops.js"></script>
  <script src="routes-community.js?v=9"></script>
</body>
</html>
