<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>საზოგადოების მარშრუტები — Kontrolio</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css?v=3">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style>
  /* ორიგინალი სტილების შენარჩუნება */
  html, body{ height:auto; min-height:100%; overflow-y:auto; background: var(--page-bg); }
  .rcPage{ max-width: 560px; margin: 0 auto; min-height: 100vh; background: var(--surface); display:flex; flex-direction:column; transition: max-width 0.2s ease; }
  
  @media (min-width: 900px){
    .rcPage{ max-width: 1280px; }
    /* პროპორციული განლაგება: ავტომატური სვეტები */
    .rcPage.wide-list .rcListGrid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .rcDrawWrap.active{ padding: 18px 24px 40px; }
  }

  /* ახალი ელემენტების სტილი */
  .rcSearchContainer { padding: 0 0 15px 0; position: sticky; top: 0; background: var(--surface); z-index: 10; }
  .rcSearchWrapper { position: relative; display: flex; align-items: center; }
  .rcSearchWrapper i { position: absolute; left: 12px; color: var(--grey); width: 18px; }
  .rcSearchInput { width: 100%; padding: 12px 12px 12px 40px; border-radius: 12px; border: 1.5px solid var(--grey-soft); background: var(--grey-soft); font-family: inherit; font-size: 14px; outline: none; }
  .rcSearchInput:focus { border-color: var(--bus-blue); background: var(--surface); }

  .rcMapLocateBtn { position: absolute; top: 12px; right: 12px; z-index: 1000; width: 40px; height: 40px; border-radius: 10px; background: var(--surface); border: 1px solid var(--grey-soft); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  
  /* წერტილების რედაქტირების ვიზუალი */
  .rc-edit-node { background: #fff; border: 2px solid var(--bus-blue); border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.3); }

  /* დანარჩენი ორიგინალი სტილები (rcCard, rcPage__header და ა.შ. აღებულია style.css-დან) */
</style>
</head>
<body>

  <div class="rcPage wide-list" id="rcPage">
    <header class="rcPage__header">
      <a class="rcPage__backBtn" id="rcBackBtn" href="index.html" aria-label="უკან"><i data-lucide="arrow-left"></i></a>
      <div class="rcPage__title"><i data-lucide="route"></i> <span id="rcHeaderTitle">მარშრუტები</span></div>
      <button class="rcPage__addBtn" id="rcAddBtn" type="button"><i data-lucide="pencil"></i> ახალი</button>
    </header>

    <div class="rcPage__body" id="rcListBody">
      <!-- ძებნა/ფილტრი -->
      <div class="rcSearchContainer">
        <div class="rcSearchWrapper">
          <i data-lucide="search"></i>
          <input type="text" id="rcRouteSearch" class="rcSearchInput" placeholder="ძებნა ნომრით ან სახელით..." autocomplete="off">
        </div>
      </div>

      <div id="rcList" class="rcListGrid">
        <p class="rcListEmpty">იტვირთება...</p>
      </div>
    </div>

    <div class="rcDrawWrap" id="rcDrawWrap">
      <div class="rcDrawWrap__mapCol">
        <div id="rcMap" style="position:relative;">
          <!-- GPS ცენტრირება -->
          <button class="rcMapLocateBtn" id="rcLocateBtn" title="ჩემი მდებარეობა"><i data-lucide="navigation"></i></button>
        </div>
        <p class="rcDrawHint">დააჭირე რუკას წერტილის დასასმელად. წასაშლელად დააჭირე დასმულ წერტილს, გადასაადგილებლად — ათრიე.</p>
        <div class="rcDrawToolbar">
          <button type="button" id="rcUndoBtn"><i data-lucide="undo-2"></i> უკან</button>
          <button type="button" id="rcClearBtn" class="danger"><i data-lucide="trash-2"></i> გასუფთავება</button>
        </div>
        <button class="rcStepNextBtn hidden" id="rcStepNextBtn" type="button">გაგრძელება <i data-lucide="arrow-right"></i></button>
      </div>

      <div class="rcDrawWrap__formCol">
        <div class="rcStepBackBar hidden" id="rcStepBackBar"><button type="button" id="rcStepBackBtn"><i data-lucide="arrow-left"></i> რუკა</button></div>
        <div class="rcForm">
          <label class="rcForm__label">ტრანსპორტი</label>
          <div class="rcVehicleToggle">
            <button type="button" data-vehicle="bus" class="selected" id="rcVehicleBus"><i data-lucide="bus"></i> ავტობუსი</button>
            <button type="button" data-vehicle="minibus" id="rcVehicleMinibus"><i data-lucide="truck"></i> მინიავტობუსი</button>
          </div>
          <label class="rcForm__label">მარშრუტის ნომერი</label>
          <input class="rcInput" id="rcRouteNumber" inputmode="numeric" placeholder="მაგ. 155" />
          <label class="rcForm__label">დასახელება</label>
          <input class="rcInput" id="rcRouteName" placeholder="მაგ. ვარკეთილი - ბარათაშვილი" />
          <p class="rcFieldError" id="rcFormError"></p>
        </div>
      </div>
    </div>
  </div>

  <div class="rcSubmitBar" id="rcSubmitBar">
    <button type="button" id="rcSubmitBtn">გაგზავნა</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="stops.js"></script>
  <script src="routes-community.js?v=4"></script>
</body>
</html>
