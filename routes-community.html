<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>საზოგადოების მარშრუტები — Kontrolio</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style>
  html, body{ height:auto; min-height:100%; overflow-y:auto; background: var(--page-bg); }

  .rcPage{
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    background: var(--surface);
    display:flex; flex-direction:column;
  }
  .rcPage__header{
    position: sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:12px;
    padding: 16px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--grey-soft);
  }
  .rcPage__backBtn{
    display:flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:50%;
    border:1px solid var(--chrome-btn-border);
    background: var(--chrome-btn-bg);
    color: var(--chrome-text);
    text-decoration:none;
    flex-shrink:0;
  }
  .rcPage__backBtn:hover{ background: var(--chrome-btn-bg-hover); }
  .rcPage__title{
    display:flex; align-items:center; gap:8px;
    font-size:17px; font-weight:700;
    color: var(--text);
    flex:1;
  }
  .rcPage__title [data-lucide]{ width:19px; height:19px; color: var(--bus-blue); }

  .rcPage__addBtn{
    display:flex; align-items:center; gap:6px;
    padding: 8px 14px;
    border-radius: 20px;
    border:none;
    background: var(--bus-blue);
    color:#fff;
    font-family:inherit;
    font-size:13px; font-weight:700;
    cursor:pointer;
    flex-shrink:0;
  }
  .rcPage__addBtn:hover{ opacity:0.9; }
  .rcPage__addBtn [data-lucide]{ width:16px; height:16px; }

  .rcPage__body{ flex:1; padding: 14px 18px 40px; }

  /* ---------- სია ---------- */
  .rcListEmpty{
    text-align:center;
    color: var(--grey);
    font-size: 14px;
    padding: 60px 20px;
    line-height:1.6;
  }
  .rcCard{
    display:flex; flex-direction:column; gap:8px;
    padding: 14px 16px;
    border-radius: 14px;
    background: var(--grey-soft);
    margin-bottom: 12px;
    cursor:pointer;
  }
  .rcCard__top{ display:flex; align-items:center; gap:10px; }
  .rcCard__badge{
    display:inline-flex; align-items:center; justify-content:center;
    min-width: 40px; height:28px;
    padding: 0 8px;
    border-radius: 8px;
    font-weight:800; font-size:14px;
    color:#fff;
  }
  .rcCard__badge--bus{ background: var(--green); }
  .rcCard__badge--minibus{ background: var(--bus-blue); }
  .rcCard__name{ font-weight:700; font-size:14.5px; color: var(--text); flex:1; }
  .rcCard__model{ font-size:12px; color: var(--grey); }
  .rcCard__desc{ font-size:13px; color: var(--text); line-height:1.5; opacity:0.85; }

  /* ---------- Draw/submit mode ---------- */
  .rcDrawWrap{ display:none; flex-direction:column; flex:1; }
  .rcDrawWrap.active{ display:flex; }
  .rcPage__body.drawing{ display:none; }

  #rcMap{
    width:100%; height: 46vh; min-height:280px;
    border-radius:0;
  }
  .rcDrawHint{
    padding: 10px 18px;
    background: rgba(31,111,214,0.08);
    color: var(--bus-blue);
    font-size: 12.5px;
    font-weight:600;
    text-align:center;
  }
  .rcDrawToolbar{
    display:flex; gap:8px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--grey-soft);
  }
  .rcDrawToolbar button{
    flex:1;
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding: 9px 10px;
    border-radius: 10px;
    border: 1px solid var(--grey-soft);
    background: var(--surface);
    color: var(--text);
    font-family:inherit;
    font-size: 12.5px; font-weight:600;
    cursor:pointer;
  }
  .rcDrawToolbar button:hover{ background: var(--grey-soft); }
  .rcDrawToolbar button[data-lucide], .rcDrawToolbar button [data-lucide]{ width:15px; height:15px; }
  .rcDrawToolbar button.danger{ color: var(--red); }

  .rcForm{ padding: 16px 18px 100px; overflow-y:auto; flex:1; }
  .rcForm__label{
    display:block;
    font-size:12.5px; font-weight:700;
    color: var(--grey);
    text-transform:uppercase;
    letter-spacing:0.4px;
    margin: 16px 0 8px;
  }
  .rcForm__label:first-child{ margin-top:0; }

  .rcVehicleToggle{ display:flex; gap:8px; }
  .rcVehicleToggle button{
    flex:1;
    padding: 10px;
    border-radius: 12px;
    border: 1.5px solid var(--grey-soft);
    background: var(--surface);
    color: var(--text);
    font-family:inherit; font-weight:700; font-size:13.5px;
    cursor:pointer;
  }
  .rcVehicleToggle button.selected{
    border-color: var(--bus-blue);
    background: rgba(31,111,214,0.08);
    color: var(--bus-blue);
  }

  .rcSelect, .rcInput, .rcTextarea{
    width:100%;
    padding: 11px 13px;
    border-radius: 12px;
    border: 1.5px solid var(--grey-soft);
    background: var(--surface);
    color: var(--text);
    font-family:inherit;
    font-size: 14px;
  }
  .rcSelect:focus, .rcInput:focus, .rcTextarea:focus{
    outline: 2px solid var(--bus-blue); border-color:transparent;
  }
  .rcTextarea{ resize:vertical; min-height:70px; }
  .rcFieldError{ min-height:16px; font-size:11.5px; color: var(--red); margin-top:5px; }

  .rcStopLinkList{ display:flex; flex-direction:column; gap:6px; margin-top:8px; }
  .rcStopLinkItem{
    display:flex; align-items:center; gap:8px;
    padding: 8px 10px;
    border-radius: 10px;
    background: var(--grey-soft);
    font-size: 12.5px;
  }
  .rcStopLinkItem__idx{
    width:22px; height:22px; border-radius:50%;
    background: var(--bus-blue); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; flex-shrink:0;
  }
  .rcStopLinkItem select, .rcStopLinkItem input{
    flex:1; min-width:0;
    padding: 5px 8px;
    border-radius: 7px;
    border: 1px solid var(--grey-soft);
    font-family:inherit; font-size:12px;
    background: var(--surface); color:var(--text);
  }

  .rcSubmitBar{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    max-width:560px; margin:0 auto;
    padding: 12px 18px;
    background: var(--surface);
    border-top: 1px solid var(--grey-soft);
    display:none;
  }
  .rcSubmitBar.active{ display:block; }
  .rcSubmitBar button{
    width:100%;
    padding: 13px;
    border-radius: 14px;
    border:none;
    background: var(--bus-blue);
    color:#fff;
    font-family:inherit; font-weight:700; font-size:14.5px;
    cursor:pointer;
  }
  .rcSubmitBar button:disabled{ opacity:0.5; cursor:not-allowed; }
  .rcSubmitBar__note{
    text-align:center;
    font-size:11px; color: var(--grey);
    margin-top:6px;
  }
</style>
</head>
<body>

  <div class="rcPage">
    <header class="rcPage__header">
      <a class="rcPage__backBtn" id="rcBackBtn" href="index.html" aria-label="უკან"><i data-lucide="arrow-left"></i></a>
      <div class="rcPage__title"><i data-lucide="route"></i> <span id="rcHeaderTitle">საზოგადოების მარშრუტები</span></div>
      <button class="rcPage__addBtn" id="rcAddBtn" type="button"><i data-lucide="pencil"></i> ახლის დახატვა</button>
    </header>

    <!-- ------- სია (default view) ------- -->
    <div class="rcPage__body" id="rcListBody">
      <div id="rcList">
        <p class="rcListEmpty">იტვირთება...</p>
      </div>
    </div>

    <!-- ------- დახატვა/submit (draw mode) ------- -->
    <div class="rcDrawWrap" id="rcDrawWrap">
      <div id="rcMap"></div>
      <p class="rcDrawHint" id="rcDrawHint">დააჭირე რუკას, რომ დაიწყო ხაზის დახატვა</p>
      <div class="rcDrawToolbar">
        <button type="button" id="rcUndoBtn"><i data-lucide="undo-2"></i> ბოლო წერტილის გაუქმება</button>
        <button type="button" id="rcClearBtn" class="danger"><i data-lucide="trash-2"></i> გასუფთავება</button>
      </div>

      <div class="rcForm">
        <label class="rcForm__label">ტრანსპორტის ტიპი</label>
        <div class="rcVehicleToggle">
          <button type="button" data-vehicle="bus" id="rcVehicleBus">🚌 ავტობუსი</button>
          <button type="button" data-vehicle="minibus" id="rcVehicleMinibus">🚐 მინიავტობუსი</button>
        </div>

        <label class="rcForm__label">მოდელი</label>
        <select class="rcSelect" id="rcVehicleModel"></select>

        <label class="rcForm__label">მარშრუტის ნომერი (3 ციფრი)</label>
        <input class="rcInput" id="rcRouteNumber" inputmode="numeric" maxlength="3" placeholder="მაგ. 155" />
        <p class="rcFieldError" id="rcRouteNumberError"></p>

        <label class="rcForm__label">დასახელება</label>
        <input class="rcInput" id="rcRouteName" maxlength="80" placeholder="დასაწყისი - დასასრული" />
        <p class="rcFieldError" id="rcRouteNameError"></p>

        <label class="rcForm__label">მოკლე აღწერა (არასავალდებულო)</label>
        <textarea class="rcTextarea" id="rcRouteDesc" maxlength="300" placeholder="დამატებითი დეტალები მარშრუტის შესახებ..."></textarea>

        <label class="rcForm__label">გაჩერებების მიბმა ხაზზე</label>
        <p class="rcFieldError" style="color:var(--grey); font-size:12px;">
          დააჭირე ხაზზე ნებისმიერ წერტილს, რომ დაუკავშირო გაჩერება.
        </p>
        <div class="rcStopLinkList" id="rcStopLinkList"></div>

        <p class="rcFieldError" id="rcFormError" style="margin-top:16px; font-size:13px;"></p>
      </div>
    </div>
  </div>

  <div class="rcSubmitBar" id="rcSubmitBar">
    <button type="button" id="rcSubmitBtn">გაგზავნა განსახილველად</button>
    <p class="rcSubmitBar__note">გამოქვეყნებამდე გადამოწმდება ადმინისტრატორის მიერ</p>
  </div>

  <!-- Route detail preview modal -->
  <div class="overlay hidden" id="rcDetailOverlay"></div>
  <div class="sheet hidden" id="rcDetailSheet">
    <div class="sheet__handle"></div>
    <h2 id="rcDetailName">მარშრუტი</h2>
    <p class="sheet__caption" id="rcDetailMeta"></p>
    <p class="menuDrawer__text" id="rcDetailDesc"></p>
    <button class="sheet__close" id="rcDetailClose">დახურვა</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="stops.js"></script>
  <script src="routes-community.js"></script>
</body>
</html>
